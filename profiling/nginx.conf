# Prefer cookie value over header for each SPX trigger var. php-spx reads
# HTTP_SPX_* fastcgi params (not HTTP_COOKIE), so cookies only reach SPX if
# nginx bridges them. Headers are still used by the bench runner's k6 probe.
map $cookie_SPX_KEY $spx_key_final {
    "" $http_spx_key;
    default $cookie_SPX_KEY;
}
map $cookie_SPX_UI_URI $spx_ui_uri_final {
    "" $http_spx_ui_uri;
    default $cookie_SPX_UI_URI;
}
map $cookie_SPX_UI_LIST_METRICS $spx_ui_list_metrics_final {
    "" $http_spx_ui_list_metrics;
    default $cookie_SPX_UI_LIST_METRICS;
}
map $cookie_SPX_ENABLED $spx_enabled_final {
    "" $http_spx_enabled;
    default $cookie_SPX_ENABLED;
}
map $cookie_SPX_REPORT_KEY $spx_report_key_final {
    "" $http_spx_report_key;
    default $cookie_SPX_REPORT_KEY;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Pass SPX headers through. Nginx doesn't forward arbitrary
        # headers as fastcgi params by default, so each SPX-* header we
        # want php-spx to see needs an explicit line here.
        #
        # NOTE: we deliberately do NOT forward HTTP_SPX_UI_URI /
        # HTTP_SPX_UI_LIST_METRICS. Passing them always (even empty)
        # makes php-spx interpret every request as a UI request and
        # return the SPX control-panel HTML instead of the profiled
        # response. The UI itself is reached via the `?SPX_UI_URI=/`
        # query-string trigger, which SPX reads directly from the
        # request URI and does not need HTTP_* bridging.
        fastcgi_param HTTP_SPX_ENABLED $spx_enabled_final;
        fastcgi_param HTTP_SPX_KEY $spx_key_final;
        fastcgi_param HTTP_SPX_REPORT_KEY $spx_report_key_final;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        log_not_found off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
